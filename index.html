<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>E-LEARNING PLATFORM</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="home-header">
  <h1>LEARNING PAGE</h1>
  <p>Learn • Track • Grow</p>
  <a href="courses.html" class="btn primary">Go to Courses</a>
</header>

<section class="history-section">
  <h2>📘 History</h2>
  <ul id="historyList"></ul>
</section>

<script>
  const historyList = document.getElementById("historyList");
  const history = JSON.parse(localStorage.getItem("learningHistory")) || [];

  if (history.length === 0) {
    historyList.innerHTML = "<li>No courses opened yet</li>";
  } else {
    history.slice().reverse().forEach(item => {
      const li = document.createElement("li");
      li.innerHTML = `<strong>${item.name}</strong><br><small>${item.time}</small>`;
      historyList.appendChild(li);
    });
  }
</script>

</body>
</html>
